apiVersion: v1
kind: Namespace
metadata:
  name: casino-benchmark
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-redis
  namespace: casino-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            [
              "redis-server",
              "--appendonly",
              "no",
              "--maxmemory",
              "512mb",
              "--maxmemory-policy",
              "allkeys-lru",
            ]
          ports:
            - containerPort: 6379
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: casino-benchmark
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-nats
  namespace: casino-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          command: ["nats-server", "-js", "-sd", "/data"]
          ports:
            - containerPort: 4222
            - containerPort: 8222
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nats-service
  namespace: casino-benchmark
spec:
  selector:
    app: nats
  ports:
    - name: client
      protocol: TCP
      port: 4222
      targetPort: 4222
    - name: monitor
      protocol: TCP
      port: 8222
      targetPort: 8222
