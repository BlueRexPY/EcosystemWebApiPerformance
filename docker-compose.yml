version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: casino_postgres
    environment:
      POSTGRES_DB: casino_db
      POSTGRES_USER: engine_admin
      POSTGRES_PASSWORD: super_secure_pass_123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    command:
      ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engine_admin -d casino_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: casino_redis
    ports:
      - "6379:6379"
    # Tuned for synchronous data consistency: sync disk mutations every second
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: casino_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  pgdata:
